<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Timetable</title>
    <link rel="stylesheet" href="css/theme.css">
    <script src="js/api.js" defer></script>
    <script src="js/app.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            /* Inheriting from system theme */
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: var(--border-color);
            --danger: #ef4444;
            --success: #10b981;
            --accent-1: var(--primary-color);
            --accent-2: var(--primary-hover);
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --glass-bg: rgba(26, 29, 36, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Background Gradients */
        .ambient-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .blob-1 {
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            background: var(--primary-color);
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background: var(--accent-1);
            animation-delay: -5s;
        }
        
        .blob-3 {
            top: 40%;
            left: 30%;
            width: 300px;
            height: 300px;
            background: var(--accent-2);
            animation-delay: -10s;
            opacity: 0.3;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-1));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .theme-btn:hover {
            background: rgba(128, 128, 128, 0.1);
            transform: rotate(15deg);
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: var(--card-shadow);
        }

        .panel-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Schedule Configurator */
        .day-row {
            background: rgba(128, 128, 128, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }

        .day-row.active {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.05);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .day-toggle {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            font-weight: 500;
            font-size: 1.1rem;
        }

        .toggle-switch {
            width: 44px;
            height: 24px;
            background: var(--text-secondary);
            border-radius: 12px;
            position: relative;
            transition: 0.3s;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        input[type="checkbox"] {
            display: none;
        }

        input[type="checkbox"]:checked + .toggle-switch {
            background: var(--primary-color);
        }

        input[type="checkbox"]:checked + .toggle-switch::after {
            transform: translateX(20px);
        }

        .slots-container {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed var(--glass-border);
            display: none;
        }

        .day-row.active .slots-container {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slot-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: var(--bg-color);
            border-radius: 12px;
            padding: 0.5rem 1rem;
            border: 1px solid var(--glass-border);
            flex: 1;
        }

        .input-group input[type="time"], .input-group input[type="number"] {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            flex: 1;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-outline {
            background: transparent;
            border: 1px dashed var(--primary-color);
            color: var(--primary-color);
            width: 100%;
        }

        .btn-outline:hover {
            background: rgba(99, 102, 241, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-1));
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        /* Timeline Beautiful UI */
        .timeline {
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 5px;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary-color), var(--accent-2), transparent);
            border-radius: 2px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 2rem;
            animation: slideIn 0.5s ease backwards;
        }

        .timeline-item:nth-child(2) { animation-delay: 0.1s; }
        .timeline-item:nth-child(3) { animation-delay: 0.2s; }
        .timeline-item:nth-child(4) { animation-delay: 0.3s; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .timeline-dot {
            position: absolute;
            left: -32px;
            top: 4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--bg-color);
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .timeline-content {
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        .timeline-content::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary-color);
        }

        .t-time {
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .t-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .t-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-color);
            margin-top: 0.75rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--success);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>

    <header>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a href="dashboard.html" style="color: var(--text-secondary); text-decoration: none; font-size: 1.2rem; display: flex; align-items: center; transition: 0.2s;" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='var(--text-secondary)'">
                ←
            </a>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                StudySync
            </div>
        </div>
        <button class="theme-btn" id="themeToggle" title="Toggle Theme">🌙</button>
    </header>

    <div class="container">
        <!-- Configuration Panel -->
        <div class="glass-panel">
            <h2 class="panel-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                Weekly Timetable
            </h2>
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.9rem;">
                Activate study days and define your available time blocks.
            </p>

            <div id="scheduleContainer">
                <!-- Days will be dynamically injected here -->
            </div>

            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="saveBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                Save Schedule
            </button>
        </div>

        <!-- Preview Panel -->
        <div class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 class="panel-title" style="margin-bottom: 0;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                    Schedule Preview
                </h2>
                <span style="font-size: 0.8rem; color: var(--text-secondary); font-weight: 600; text-transform: uppercase;">Generated</span>
            </div>

            <div class="timeline" id="timelinePreview">
                <!-- Fallback/Loading or Dynamic items go here -->
                <p style="color: var(--text-secondary); font-size: 0.95rem;">Save your timetable to see a preview of your schedule here.</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Changes saved successfully!</div>

    <script>
        const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const scheduleContainer = document.getElementById('scheduleContainer');
        const saveBtn = document.getElementById('saveBtn');
        const timelinePreview = document.getElementById('timelinePreview');
        const toast = document.getElementById('toast');

        // Data Storage
        let scheduleData = {};

        // Convert Backend Schema to UI Schema
        function parseBackendSchedule(backendSchedule) {
            let uiData = {};
            if(backendSchedule && Array.isArray(backendSchedule)) {
                backendSchedule.forEach(item => {
                    uiData[item.day] = {
                        active: item.active,
                        slots: item.timeSlots ? item.timeSlots.map(slot => ({ time: slot.startTime, duration: slot.hours })) : [{time: "09:00", duration: 1}]
                    };
                });
            }
            return uiData;
        }

        // Convert UI Schema to Backend Schema
        function generateBackendSchedule() {
            return days.map(day => {
                const uiDay = scheduleData[day] || { active: false, slots: [] };
                return {
                    day: day,
                    active: uiDay.active,
                    timeSlots: uiDay.slots.map(slot => ({ hours: slot.duration, startTime: slot.time }))
                };
            });
        }

        async function initTimetable() {
            try {
                const token = localStorage.getItem('token');
                if(!token) {
                    window.location.href = 'login.html';
                    return;
                }
                const res = await getProfile();
                if(res.success && res.data && res.data.schedule) {
                    scheduleData = parseBackendSchedule(res.data.schedule);
                }
            } catch (err) {
                console.error("Failed to load schedule from server", err);
                // Fallback to empty if api fails
            }
            renderConfigurator();
            if (Object.keys(scheduleData).length > 0) {
                renderPreview();
            }
        }

        function renderConfigurator() {
            scheduleContainer.innerHTML = '';
            
            days.forEach(day => {
                const dayData = scheduleData[day] || { active: false, slots: [{ time: "09:00", duration: 1 }] };
                
                const dayRow = document.createElement('div');
                dayRow.className = `day-row ${dayData.active ? 'active' : ''}`;
                
                // Header
                const header = document.createElement('div');
                header.className = 'day-header';
                
                const label = document.createElement('label');
                label.className = 'day-toggle';
                label.innerHTML = `
                    <input type="checkbox" ${dayData.active ? 'checked' : ''}>
                    <div class="toggle-switch"></div>
                    ${day}
                `;
                
                header.appendChild(label);
                dayRow.appendChild(header);

                // Slots Container
                const slotsContainer = document.createElement('div');
                slotsContainer.className = 'slots-container';

                const renderSlots = () => {
                    slotsContainer.innerHTML = '';
                    dayData.slots.forEach((slot, index) => {
                        const slotRow = document.createElement('div');
                        slotRow.className = 'slot-row';
                        
                        slotRow.innerHTML = `
                            <div class="input-group" title="Start Time">
                                <span style="color: var(--text-secondary); margin-right: 0.5rem;">🕒</span>
                                <input type="time" value="${slot.time}" class="time-input" data-index="${index}">
                            </div>
                            <div class="input-group" title="Duration (Hours)">
                                <span style="color: var(--text-secondary); margin-right: 0.5rem;">⏳</span>
                                <input type="number" min="0.5" step="0.5" max="12" value="${slot.duration}" class="dur-input" data-index="${index}">
                                <span style="color: var(--text-secondary); font-size: 0.8rem; margin-left: 0.5rem;">hrs</span>
                            </div>
                            <button class="icon-btn del-btn" data-index="${index}" title="Remove Slot">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        `;
                        slotsContainer.appendChild(slotRow);
                    });

                    // Add Slot Button
                    const addBtn = document.createElement('button');
                    addBtn.className = 'btn btn-outline';
                    addBtn.innerHTML = '+ Add Time Block';
                    addBtn.onclick = () => {
                        dayData.slots.push({ time: "18:00", duration: 1.5 });
                        renderSlots();
                    };
                    slotsContainer.appendChild(addBtn);

                    // Event Listeners for inputs
                    slotsContainer.querySelectorAll('.time-input').forEach(input => {
                        input.onchange = (e) => dayData.slots[e.target.dataset.index].time = e.target.value;
                    });
                    slotsContainer.querySelectorAll('.dur-input').forEach(input => {
                        input.onchange = (e) => dayData.slots[e.target.dataset.index].duration = parseFloat(e.target.value);
                    });
                    slotsContainer.querySelectorAll('.del-btn').forEach(btn => {
                        btn.onclick = (e) => {
                            const idx = e.currentTarget.dataset.index;
                            if (dayData.slots.length > 1) {
                                dayData.slots.splice(idx, 1);
                                renderSlots();
                            } else {
                                alert("Must have at least one slot if day is active.");
                            }
                        };
                    });
                };

                renderSlots();
                dayRow.appendChild(slotsContainer);

                // Toggle Listener
                const checkbox = label.querySelector('input');
                checkbox.addEventListener('change', (e) => {
                    dayData.active = e.target.checked;
                    if (dayData.active) {
                        dayRow.classList.add('active');
                    } else {
                        dayRow.classList.remove('active');
                    }
                    scheduleData[day] = dayData; // update ref
                });

                scheduleData[day] = dayData;
                scheduleContainer.appendChild(dayRow);
            });
        }

        // Format times like "09:00" + duration to "9:00 AM - 10:30 AM"
        function formatTimeRange(startTime, durHours) {
            let [h, m] = startTime.split(':').map(Number);
            
            const formatAmPm = (hours, mins) => {
                const ampm = hours >= 12 ? 'PM' : 'AM';
                let formattedH = hours % 12 || 12;
                let formattedM = mins.toString().padStart(2, '0');
                return `${formattedH}:${formattedM} ${ampm}`;
            };

            const startStr = formatAmPm(h, m);
            
            let totalMins = (h * 60) + m + (durHours * 60);
            let endH = Math.floor(totalMins / 60) % 24;
            let endM = totalMins % 60;
            const endStr = formatAmPm(endH, endM);

            return `${startStr} - ${endStr}`;
        }

        function renderPreview() {
            let activeDays = days.filter(d => scheduleData[d] && scheduleData[d].active);
            
            if (activeDays.length === 0) {
                timelinePreview.innerHTML = '<p style="color: var(--text-secondary); font-size: 0.95rem;">No days activated. Activate a day to see the timeline.</p>';
                return;
            }

            timelinePreview.innerHTML = '';

            // Generate some dummy beautiful timeline based on the config
            activeDays.forEach((day, dIdx) => {
                const slots = scheduleData[day].slots;
                
                // Sort slots chronologically
                let sortedSlots = [...slots].sort((a,b) => a.time.localeCompare(b.time));

                sortedSlots.forEach((slot, sIdx) => {
                    const timeRange = formatTimeRange(slot.time, slot.duration);
                    
                    // Dummy subject names for variety
                    const subjects = ['Data Structures', 'Web Development', 'System Design', 'Machine Learning'];
                    const subject = subjects[(dIdx + sIdx) % subjects.length];
                    const colors = ['var(--primary-color)', 'var(--accent-1)', 'var(--accent-2)', 'var(--success)'];
                    const color = colors[(dIdx + sIdx) % colors.length];

                    const item = document.createElement('div');
                    item.className = 'timeline-item';
                    item.innerHTML = `
                        <div class="timeline-dot" style="border-color: ${color};"></div>
                        <div class="timeline-content" style="--primary: ${color}">
                            <div class="t-time">${day} • ${timeRange}</div>
                            <div class="t-title">${subject} Session</div>
                            <div class="t-desc">Focused deep work session based on your timetable configuration.</div>
                            <div class="badge" style="color: ${color}; background: ${color}20;">${slot.duration} Hour${slot.duration !== 1 ? 's' : ''} Block</div>
                        </div>
                    `;
                    timelinePreview.appendChild(item);
                });
            });
        }

        function showToast() {
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        saveBtn.addEventListener('click', async () => {
            saveBtn.disabled = true;
            saveBtn.innerHTML = 'Saving...';
            try {
                const newSchedule = generateBackendSchedule();
                const res = await updateScheduleApi(newSchedule);
                if(res.success) {
                    renderPreview();
                    showToast();
                } else {
                    alert('Failed to save to server!');
                }
            } catch (err) {
                console.error(err);
                alert("An error occurred while saving.");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    Save Schedule
                `;
            }
        });

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            initTimetable();
        });

    </script>
</body>
</html>
