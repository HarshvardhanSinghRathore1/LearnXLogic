<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup - LearnXLogic</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
        }
    </style>
</head>
<body>
    <header class="navbar container">
        <div class="logo"><a href="index.html">LearnXLogic</a></div>
        <nav class="nav-links">
            <button id="themeToggle" class="btn">🌙</button>
        </nav>
    </header>

    <main class="container">
        <div class="glass-card auth-container">
            <h2 id="authTitle" style="margin-bottom: 2rem; text-align: center;">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group" id="nameGroup" style="display: none;">
                    <label for="name">Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%;">Log In</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
                <span id="toggleText">Don't have an account?</span> <a href="#" id="toggleLink" style="color: var(--primary-color);">Sign Up</a>
            </p>
        </div>
    </main>
    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script>
        let isLogin = true;

        document.getElementById('toggleLink').addEventListener('click', (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            
            document.getElementById('authTitle').innerText = isLogin ? 'Welcome Back' : 'Create an Account';
            document.getElementById('nameGroup').style.display = isLogin ? 'none' : 'block';
            document.getElementById('name').required = !isLogin;
            document.getElementById('submitBtn').innerText = isLogin ? 'Log In' : 'Sign Up';
            document.getElementById('toggleText').innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggleLink').innerText = isLogin ? 'Sign Up' : 'Log In';
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;

            try {
                btn.innerText = isLogin ? 'Logging in...' : 'Signing up...';
                btn.disabled = true;
                
                let data;
                if(isLogin) {
                    data = await loginUser(email, password);
                } else {
                    data = await registerUser(name, email, password);
                }
                
                if (data.success) {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                alert(error.message || (isLogin ? 'Login failed' : 'Signup failed'));
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
